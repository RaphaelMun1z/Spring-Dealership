name: Continuous Integration with Github Actions

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Application JAR
        working-directory: ${{ github.workspace }}
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        working-directory: ${{ github.workspace }}
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dealership-backend:latest .

      - name: Push to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/dealership-backend:latest ${{ secrets.DOCKER_USERNAME }}/dealership-backend:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/dealership-backend:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/dealership-backend:latest

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
