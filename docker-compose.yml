services:
  backend:
    container_name: DealershipProject
    image: raphaelmuniz/dealership-backend:1.0.0
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
    networks:
      - postgres-compose-network

  db:
    container_name: db
    image: postgres:16.3
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dealership_database
    ports:
      - "5000:5432"
    restart: always
    networks:
      - postgres-compose-network

networks:
  postgres-compose-network:
    driver: bridge