spring:
  application:
    name: dealership
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
      dialect: PostgreSQLDialect
      jdbc:
        lob:
          non_contextual_creation: true
  flyway:
    enabled: true
    baseline-on-migrate: true
file:
  upload-dir: ./temp-uploads-testes
cors:
  originPatterns: http://localhost:3000